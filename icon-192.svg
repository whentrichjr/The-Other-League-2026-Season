<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#050914"/>
  <rect width="192" height="192" rx="40" fill="#0f7a3a" opacity="0.18"/>
  <!-- Golf flag pin -->
